<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Corrector PAES · Selector de Asignatura</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* Estilos específicos para el Hub que no están en el CSS general */
    .hub-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      text-align: center;
      padding: 20px;
    }
    .hub-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      width: 100%;
      margin-top: 40px;
    }
    .subject-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 30px 20px;
      text-decoration: none;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }
    .subject-card:hover {
      transform: translateY(-5px);
      border-color: var(--accent-color, var(--accent));
      background: var(--bg3);
    }
    .subject-icon {
      width: 60px; height: 60px; /* Un poco más grande para el emoji */
      display: grid;
      place-items: center;
      border-radius: 14px;
      margin-bottom: 10px;
      font-size: 30px; /* Tamaño del emoji */
    }
    .subject-card h2 {
      font-size: 1.1rem;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--text);
    }
    /* Colores por asignatura (bordes y títulos) */
    .mate { --accent-color: var(--accent); }
    .leng { --accent-color: var(--pink); }
    .cien { --accent-color: var(--blue); }
    .hist { --accent-color: var(--orange); }

    .subject-card:hover h2 { color: var(--accent-color); }
    
    /* Fondo del icono (el cuadradito) */
    .icon-bg { 
      background: rgba(255,255,255,0.03); 
      border: 1px solid var(--border); 
      transition: 0.2s; 
    }
    
    /* Efecto Hover: Cambia el fondo del cuadradito, pero NO el color del emoji */
    .subject-card:hover .icon-bg { 
      background: var(--accent-color); 
    }
  </style>
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background-color: var(--bg);">

<div class="hub-container">
  <header class="section-header" style="border: none;">
    <h1 style="font-size: 2.2rem; color: var(--text);">Corrector de Ensayos y Evaluaciones</h1>
    <p style="color: var(--dim);">Selecciona la asignatura que deseas revisar hoy</p>
  </header>

  <div class="hub-grid">
    <a href="lenguaje/lenguaje.html" class="subject-card leng">
      <div class="subject-icon icon-bg">
        📚
      </div>
      <h2>Lenguaje</h2>
    </a>

    <a href="matematicas/matematicas.html" class="subject-card mate">
      <div class="subject-icon icon-bg">
        🧮
      </div>
      <h2>Matemática</h2>
    </a>

    <a href="ciencias/ciencias.html" class="subject-card cien">
      <div class="subject-icon icon-bg">
        🔬
      </div>
      <h2>Ciencias</h2>
    </a>

    <a href="historia/historia.html" class="subject-card hist">
      <div class="subject-icon icon-bg">
        🌎
      </div>
      <h2>Historia</h2>
    </a>
  </div>

  <footer style="margin-top: 60px; font-size: 0.8rem; color: var(--dim);">
   <div style="font-size: 17px; color: #777; margin-top: 10px;"> Herramienta desarrollada por <strong>Michael Antonio Núñez Núñez</strong>.
    <br>Herramienta para docentes y tutores.
    <br>Uso libre autorizado.
    </div>
  </footer>
</div>

</body>
</html>
